<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title></title>
</head>
<body>
	<h1>День рождение любимой через</h1>
	<div class="conteiner" id="cont">
		<div class="card">
			<span class="value" id="days">00</span>
			<span class="lable"><b>ДНЕЙ</b></span>
		</div>
		<div class="card">
		<span class="value" id="hours">00</span>
		<span class="lable"><b>ЧАСОВ</b></span>
	</div>
		<div class="card">
		<span class="value" id="minutes">00</span>
		<span class="lable"><b>МИНУТ<b></span>
	</div>
		<div class="card">
		<span class="value" id="seconds">00</span>
		<span class="lable">СЕКУНД</span>
	</div>
	</div>
<script >
	let newYear = new Date("December 9, 2025 00:00:00").getTime();
	function timeAlways() {
          let now = new Date().getTime();
          let distance = newYear - now;


          if (distance<0) {
          clearInterval(countInter);
          document.getElementById('cont').innerHTML = "";
          document.getElementById('soo').innerHTML = " с новым годом";
          return;
          }
          let second = 1000;
          let minute = second * 60;
          let hour = minute * 60;
          let day = hour * 24;

          let days = Math.floor(distance/day);
          let hours = Math.floor((distance%day)/hour);
          let minutes = Math.floor((distance%hour)/minute);
          let seconds = Math.floor((distance%minute)/second);

          document.getElementById('days').innerText = days;
          document.getElementById('hours').innerText = hours;
          document.getElementById('minutes').innerText = minutes;
          document.getElementById('seconds').innerText = seconds;
	}
	timeAlways();
	let counInter = setInterval (timeAlways,1000);
</script>
</body>
</html>
