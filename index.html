<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Тестирование</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background-color: #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #f44336;
        }
        .logo span {
            color: #4CAF50;
        }
        #setup-screen, #test-screen, #result-screen {
            display: none;
            flex: 1;
        }
        #setup-screen.active, #test-screen.active, #result-screen.active {
            display: flex;
            flex-direction: column;
        }
        .input-group {
            background-color: #242424;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #aaa;
            font-size: 14px;
        }
        select {
            width: 100%;
            background-color: #121212;
            color: #fff;
            border: 1px solid #4CAF50;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            appearance: none;
        }
        button {
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-green {
            background-color: #4CAF50;
            color: white;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-green:hover { background-color: #45a049; }
        .q-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #888;
            font-size: 14px;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }
        .option {
            background-color: #242424;
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option .circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .option.correct {
            border-color: #4CAF50;
            background-color: rgba(76, 175, 80, 0.1);
        }
        .option.correct .circle {
            border-color: #4CAF50;
            background-color: #4CAF50;
        }
        .option.wrong {
            border-color: #f44336;
            background-color: rgba(244, 67, 54, 0.1);
        }
        .option.wrong .circle {
            border-color: #f44336;
            background-color: #f44336;
        }
        .option.disabled {
            pointer-events: none;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: auto;
            margin-bottom: 20px;
        }
        .controls button {
            flex: 1;
        }
        .result-box {
            background-color: #242424;
            padding: 40px 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 50px;
        }
        .result-box h2 { margin-bottom: 10px; font-size: 24px; }
        .score { font-size: 48px; color: #4CAF50; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">Biology <span>Online</span></div>
    </header>

    <div id="setup-screen" class="active">
        <div class="input-group">
            <label>Количество вопросов</label>
            <select id="q-count">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="40">40</option>
                <option value="50">50</option>
                <option value="60">60</option>
                <option value="70">70</option>
                <option value="80">80</option>
                <option value="90">90</option>
                <option value="100">100</option>
            </select>
        </div>
        <button class="btn-green" onclick="startTest()">Начать тест</button>
    </div>

    <div id="test-screen">
        <div class="q-header">
            <span id="q-number">Вопрос №1</span>
            <span id="q-progress">1 из 20</span>
        </div>
        <div class="question-text" id="q-text">Текст вопроса</div>
        <div class="options" id="options-container"></div>
        <div class="controls">
            <button class="btn-green" id="next-btn" onclick="nextQuestion()">Далее</button>
        </div>
        <button class="btn-green" onclick="finishTest()">Завершить тест</button>
    </div>

    <div id="result-screen">
        <div class="result-box">
            <h2>Тест завершен</h2>
            <div class="score"><span id="score-correct">0</span> / <span id="score-total">0</span></div>
            <p>правильных ответов</p>
        </div>
        <button class="btn-green" style="margin-top: 20px;" onclick="location.reload()">На главную</button>
    </div>
</div>

    let currentQuestions = [];
    let currentIndex = 0;
    let correctCount = 0;
    let isAnswered = false;

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function startTest() {
        const count = parseInt(document.getElementById('q-count').value);
        const shuffledDB = shuffle([...database]);
        currentQuestions = shuffledDB.slice(0, count);
        currentIndex = 0;
        correctCount = 0;
        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('test-screen').classList.add('active');
        loadQuestion();
    }

    function loadQuestion() {
        isAnswered = false;
        const qData = currentQuestions[currentIndex];
        document.getElementById('q-number').innerText = `Вопрос №${currentIndex + 1}`;
        document.getElementById('q-progress').innerText = `${currentIndex + 1} из ${currentQuestions.length}`;
        document.getElementById('q-text').innerText = qData.q;
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        const shuffledOptions = shuffle([...qData.opts]);
        const labels = ['А)', 'В)', 'С)', 'D)', 'E)'];

        shuffledOptions.forEach((optText, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.onclick = () => selectOption(div, optText, qData.ans);
            div.innerHTML = `
                <div class="circle"></div>
                <div>${labels[i]} ${optText}</div>
            `;
            optionsContainer.appendChild(div);
        });
    }

    function selectOption(selectedElement, selectedText, correctText) {
        if (isAnswered) return;
        isAnswered = true;
        const optionsContainer = document.getElementById('options-container');
        const allOptions = optionsContainer.children;

        for (let opt of allOptions) {
            opt.classList.add('disabled');
        }

        if (selectedText === correctText) {
            selectedElement.classList.add('correct');
            correctCount++;
        } else {
            selectedElement.classList.add('wrong');
            for (let opt of allOptions) {
                if (opt.innerText.includes(correctText)) {
                    opt.classList.add('correct');
                }
            }
        }
    }

    function nextQuestion() {
        if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            loadQuestion();
        } else {
            finishTest();
        }
    }

    function finishTest() {
        document.getElementById('test-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('score-correct').innerText = correctCount;
        document.getElementById('score-total').innerText = currentQuestions.length;
    }
